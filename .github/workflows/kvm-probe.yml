name: KVM Probe
on:
  pull_request:
    branches: [main]
jobs:
  probe:
    name: KVM Probe
    runs-on: ubuntu-latest
    steps:
      - name: What does a standard runner expose?
        run: |
          echo "=== /dev/kvm present? ==="
          ls -la /dev/kvm 2>&1 || echo "ABSENT"
          echo "=== cpu virtualisation flags ==="
          grep -oE '(vmx|svm)' /proc/cpuinfo | sort -u || echo "none"
          echo "=== current user / groups ==="
          id
          echo "=== can this user open /dev/kvm for read-write? ==="
          if [ -e /dev/kvm ]; then
            test -r /dev/kvm && echo "readable" || echo "NOT readable"
            test -w /dev/kvm && echo "writable" || echo "NOT writable"
          fi
          echo "=== after a permissive udev rule (the android-emulator trick) ==="
          if [ -e /dev/kvm ]; then
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules >/dev/null
            sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
            ls -la /dev/kvm
            test -w /dev/kvm && echo "WRITABLE after rule -> firecracker viable" || echo "still not writable"
          fi
